# OSV-Scanner / OpenSSF Scorecard ignore list for pyproject.toml's optional dev/local extras.
#
# Scorecard's "Vulnerabilities" check scans pyproject.toml including optional-dependencies and
# evaluates them pessimistically (a `>=` floor is matched against OSV without resolving to the
# installed patched version). The entries below are in the `[local]` (numpy) and `[dev]` (pytest)
# extras — NOT in the shipped core deps or the `[server]` runtime extra, so they are never installed
# by a normal `pip install aegis-memory`. The shipped surface is gated clean by
# `.github/workflows/pip-audit.yml`. Reviewed, accepted decisions.
# Full triage: docs/security/vuln-triage.md
#
# Docs: https://google.github.io/osv-scanner/configuration/

