name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://aegis:aegis@localhost:5432/aegis_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install
        # numpy is required to collect the local-mode tests (tests/test_local_*.py);
        # the heavy [local] extra (torch/sentence-transformers) is intentionally omitted —
        # the test suite uses fake embedders, so numpy alone keeps the run green and fast.
        run: pip install -e ".[server,dev]" numpy
      - name: Test
        run: pytest tests/ -v
