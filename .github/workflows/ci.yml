name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  plugin-manifests:
    # Validate the Claude Code plugin / marketplace manifests so a malformed manifest or a dangling
    # path (icon, plugin source, bundled MCP/hook files) is caught before publish — fast, no services.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Validate plugin & marketplace manifests
        run: python scripts/validate_plugin_manifests.py

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://aegis:aegis@localhost:5432/aegis_test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install
        # numpy is required to collect the local-mode tests (tests/test_local_*.py);
        # the heavy [local] extra (torch/sentence-transformers) is intentionally omitted —
        # the test suite uses fake embedders, so numpy alone keeps the run green and fast.
        run: pip install -e ".[server,dev]" numpy
      - name: Test
        run: pytest tests/ -v
