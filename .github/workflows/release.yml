name: Release

# Builds the shipped distributions once, then in parallel:
#   * signs them keylessly with Sigstore and creates a GitHub Release with the artifacts
#     AND their .sigstore.json bundles attached (OpenSSF Scorecard "Signed-Releases"), and
#   * publishes the SAME artifacts to PyPI via Trusted Publishing (OIDC) — no API token,
#     no TWINE_PASSWORD; the publish action also attaches PEP 740 attestations on PyPI.
# Triggered on v*.*.* tag pushes (same convention as docker-publish.yml); workflow_dispatch
# is a manual fallback.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload built distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  release:
    needs: build
    # Only on tag pushes — a manual workflow_dispatch has no tag to release against.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the Release and upload assets
      id-token: write   # Sigstore keyless (OIDC) signing
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Sign distributions with Sigstore
        # Emits a dist/*.sigstore.json bundle next to each input artifact.
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1  # v3.4.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl

      - name: Create GitHub Release with signed assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.sigstore.json
          generate_release_notes: true

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    # Optional hardening: gate this behind a GitHub environment named "pypi" with required
    # reviewers, and scope the PyPI trusted publisher to that environment.
    # environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC) — replaces the API token entirely
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # No username/password/token: the OIDC identity of this workflow is exchanged with
        # PyPI for a short-lived token. PEP 740 attestations are generated and uploaded by
        # default (id-token: write is present).
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
