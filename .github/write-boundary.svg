<svg viewBox="0 0 720 300" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="wb-t wb-d">
  <title id="wb-t">The Aegis write boundary</title>
  <desc id="wb-d">Every source and every agent writes through one Aegis guard. Clean writes cross the boundary at the delta into shared memory; poisoned writes are stopped at the line and rejected, never stored.</desc>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "JetBrains Mono", monospace; }
    .kick { fill:#c45d3e; letter-spacing:.14em; font-size:11px; font-weight:600; }
    .lbl  { fill:#1a1a1a; font-size:13px; }
    .sub  { fill:#888888; font-size:10px; letter-spacing:.06em; }
    .unt  { fill:#a84e33; font-size:9px; letter-spacing:.12em; }
    .ver  { fill:#555555; font-size:9px; letter-spacing:.12em; }
    .bad  { fill:#7c2b21; font-size:9px; letter-spacing:.08em; }
  </style>

  <defs>
    <marker id="ai" markerWidth="8" markerHeight="8" refX="5.5" refY="3.5" orient="auto"><path d="M0 0 L7 3.5 L0 7 Z" fill="#1a1a1a"/></marker>
    <marker id="ax" markerWidth="8" markerHeight="8" refX="5.5" refY="3.5" orient="auto"><path d="M0 0 L7 3.5 L0 7 Z" fill="#7c2b21"/></marker>
  </defs>

  <!-- plate -->
  <rect x="1" y="1" width="718" height="298" rx="8" fill="#faf9f7" stroke="#e5e2dc"/>
  <text x="28" y="34" class="kick">ASI06 · WRITE BOUNDARY</text>

  <!-- untrusted sources (left) -->
  <g>
    <rect x="34" y="84" width="168" height="48" rx="6" fill="none" stroke="#c45d3e" stroke-width="1.3"/>
    <text x="118" y="106" text-anchor="middle" class="lbl" fill="#c45d3e">External input</text>
    <text x="118" y="121" text-anchor="middle" class="unt">UNTRUSTED · ANY CHANNEL</text>
  </g>
  <g>
    <rect x="34" y="168" width="168" height="48" rx="6" fill="none" stroke="#c45d3e" stroke-width="1.3"/>
    <text x="118" y="190" text-anchor="middle" class="lbl" fill="#c45d3e">Other agents</text>
    <text x="118" y="205" text-anchor="middle" class="unt">UNTRUSTED · INTERNAL RELAY</text>
  </g>

  <!-- funnel: both sources merge into one flow before the gate (no arrowheads at the merge) -->
  <path d="M202 108 C 250 108, 272 116, 300 119.5" fill="none" stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M202 192 C 250 192, 272 126, 300 120.5" fill="none" stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round"/>

  <!-- delta mark: flat ink linework, drawn first so the boundary line stays continuous on top -->
  <path d="M368 105 L380 126 L356 126 Z" fill="#faf9f7" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- the boundary: one continuous hairline, terracotta only here -->
  <line x1="368" y1="56" x2="368" y2="248" stroke="#c45d3e" stroke-width="1.6"/>
  <text x="368" y="46" text-anchor="middle" class="kick">GUARD</text>
  <text x="300" y="74" text-anchor="middle" class="unt">UNTRUSTED</text>
  <text x="452" y="74" text-anchor="middle" class="ver">VERIFIED</text>

  <!-- clean write: one flow, crossing the line at the delta, into shared memory -->
  <path d="M298 120 C 360 120, 440 104, 510 104" fill="none" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#ai)"/>

  <!-- poisoned write: stopped at the line, deflected — oxblood verdict, matching the pipeline's REJECT -->
  <path d="M344 118 C 330 156, 314 192, 292 222" fill="none" stroke="#7c2b21" stroke-width="1.5" marker-end="url(#ax)"/>
  <g><line x1="334" y1="132" x2="342" y2="140" stroke="#7c2b21" stroke-width="1.6"/><line x1="342" y1="132" x2="334" y2="140" stroke="#7c2b21" stroke-width="1.6"/></g>

  <!-- rejected node (untrusted side) -->
  <g>
    <rect x="188" y="226" width="172" height="44" rx="6" fill="none" stroke="#7c2b21" stroke-width="1.3"/>
    <text x="274" y="246" text-anchor="middle" class="lbl" fill="#7c2b21">poisoned write</text>
    <text x="274" y="261" text-anchor="middle" class="bad">REJECTED · NOT STORED</text>
  </g>

  <!-- verified side: shared memory + reader -->
  <g>
    <rect x="514" y="80" width="174" height="48" rx="6" fill="#f3f1ed" stroke="#e5e2dc"/>
    <text x="601" y="101" text-anchor="middle" class="lbl">shared memory</text>
    <text x="601" y="116" text-anchor="middle" class="ver">CLEAN STATE ✓</text>
  </g>
  <g>
    <rect x="514" y="176" width="174" height="48" rx="6" fill="#f3f1ed" stroke="#e5e2dc"/>
    <text x="601" y="197" text-anchor="middle" class="lbl">reader agent</text>
    <text x="601" y="213" text-anchor="middle" class="sub">prompt / decision</text>
  </g>
  <path d="M601 128 C 607 142, 607 158, 601 172" fill="none" stroke="#1a1a1a" stroke-width="1.3" marker-end="url(#ai)"/>
</svg>
