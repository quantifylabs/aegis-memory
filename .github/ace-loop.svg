<svg viewBox="0 0 720 260" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ace-t ace-d">
  <title id="ace-t">The ACE loop — generation, reflection, curation</title>
  <desc id="ace-d">Aegis runs the ACE cycle: query the playbook (generation), complete the run with an outcome that auto-votes and reflects (reflection), then curate to promote, flag, and consolidate. The curated playbook feeds the next run.</desc>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "JetBrains Mono", monospace; }
    .kick{fill:#c45d3e; letter-spacing:.14em; font-size:11px; font-weight:600}
    .phase{fill:#c45d3e; letter-spacing:.14em; font-size:10px; font-weight:600}
    .lbl{fill:#1a1a1a; font-size:13px} .sub{fill:#888888; font-size:10px; letter-spacing:.03em}
    .ok{fill:#555555; font-size:10px} .bad{fill:#a84e33; font-size:10px}
    .flow{stroke-dasharray:900; stroke-dashoffset:0}
    .d1{animation:draw 10s ease-out 1.0s infinite} .d2{animation:draw 10s ease-out 2.0s infinite} .d3{animation:draw 10s ease-out 3.2s infinite}
    .rise{opacity:1; animation:rise 10s ease-out infinite backwards}
    .r1{animation-delay:.3s} .r2{animation-delay:1.4s} .r3{animation-delay:2.6s}
    @keyframes draw{0%{stroke-dashoffset:900}24%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}
    @keyframes rise{0%{opacity:0}6%{opacity:1}100%{opacity:1}}
    @media (prefers-reduced-motion: reduce){*{animation:none !important}}
  </style>
  <defs>
    <marker id="ai" markerWidth="8" markerHeight="8" refX="5.5" refY="3.5" orient="auto"><path d="M0 0 L7 3.5 L0 7 Z" fill="#1a1a1a"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="5.5" refY="3.5" orient="auto"><path d="M0 0 L7 3.5 L0 7 Z" fill="#c45d3e"/></marker>
  </defs>

  <rect x="1" y="1" width="718" height="258" rx="8" fill="#faf9f7" stroke="#e5e2dc"/>
  <text x="28" y="32" class="kick">ACE · GENERATION → REFLECTION → CURATION</text>

  <!-- phase kickers -->
  <text x="130" y="86" text-anchor="middle" class="phase">GENERATION</text>
  <text x="360" y="86" text-anchor="middle" class="phase">REFLECTION</text>
  <text x="590" y="86" text-anchor="middle" class="phase">CURATION</text>

  <!-- generation -->
  <g class="rise r1">
    <rect x="40" y="96" width="180" height="70" rx="6" fill="#f3f1ed" stroke="#e5e2dc"/>
    <text x="130" y="122" text-anchor="middle" class="lbl">get_playbook()</text>
    <text x="130" y="140" text-anchor="middle" class="sub">ranked playbook</text>
    <text x="130" y="155" text-anchor="middle" class="sub">+ memories used</text>
  </g>
  <path class="flow d1" d="M220 131 L266 131" fill="none" stroke="#1a1a1a" stroke-width="1.3" marker-end="url(#ai)"/>

  <!-- reflection -->
  <g class="rise r2">
    <rect x="270" y="96" width="180" height="70" rx="6" fill="#f3f1ed" stroke="#e5e2dc"/>
    <text x="360" y="120" text-anchor="middle" class="lbl">complete_run()</text>
    <text x="360" y="139" text-anchor="middle" class="ok">success ✓ vote helpful</text>
    <text x="360" y="154" text-anchor="middle" class="bad">fail ✗ auto-reflection</text>
  </g>
  <path class="flow d2" d="M450 131 L496 131" fill="none" stroke="#1a1a1a" stroke-width="1.3" marker-end="url(#ai)"/>

  <!-- curation -->
  <g class="rise r3">
    <rect x="500" y="96" width="180" height="70" rx="6" fill="#f3f1ed" stroke="#e5e2dc"/>
    <text x="590" y="122" text-anchor="middle" class="lbl">curate()</text>
    <text x="590" y="140" text-anchor="middle" class="sub">promote · flag</text>
    <text x="590" y="155" text-anchor="middle" class="sub">· consolidate</text>
  </g>

  <!-- return arc: curated playbook feeds the next run -->
  <path class="flow d3" d="M590 166 L590 214 L130 214 L130 168" fill="none" stroke="#c45d3e" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="360" y="234" text-anchor="middle" class="sub">the curated playbook feeds the next run — context that improves itself</text>
</svg>
