<svg viewBox="0 0 720 250" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="av-t av-d">
  <title id="av-t">Memory is the attack vector</title>
  <desc id="av-d">Agent A writes untrusted output into shared memory; Agent B reads it back as an instruction and acts on it. A single poisoned write becomes another agent's command.</desc>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "JetBrains Mono", monospace; }
    .kick{fill:#c45d3e; letter-spacing:.14em; font-size:11px; font-weight:600}
    .lbl{fill:#1a1a1a; font-size:13px} .sub{fill:#888888; font-size:10px; letter-spacing:.06em}
    .unt{fill:#a84e33; font-size:9px; letter-spacing:.12em} .bad{fill:#7c2b21; font-size:9px; letter-spacing:.08em}
    .spec{fill:#555555; font-size:11px}
  </style>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="5.5" refY="3.5" orient="auto"><path d="M0 0 L7 3.5 L0 7 Z" fill="#c45d3e"/></marker>
    <marker id="ai" markerWidth="8" markerHeight="8" refX="5.5" refY="3.5" orient="auto"><path d="M0 0 L7 3.5 L0 7 Z" fill="#1a1a1a"/></marker>
    <marker id="ax" markerWidth="8" markerHeight="8" refX="5.5" refY="3.5" orient="auto"><path d="M0 0 L7 3.5 L0 7 Z" fill="#7c2b21"/></marker>
  </defs>

  <rect x="1" y="1" width="718" height="248" rx="8" fill="#faf9f7" stroke="#e5e2dc"/>
  <text x="28" y="32" class="kick">ASI06 · MEMORY IS THE VECTOR</text>

  <!-- specimen callout from Agent A -->
  <g>
    <path d="M104 104 L104 72 L250 72" fill="none" stroke="#888888" stroke-width="1"/>
    <circle cx="250" cy="72" r="3" fill="#c45d3e"/>
    <text x="262" y="68" class="spec">"Ignore previous instructions…"</text>
    <text x="262" y="83" class="sub">injection_override · trust=untrusted</text>
  </g>

  <!-- Agent A (untrusted writer) -->
  <g>
    <rect x="34" y="104" width="150" height="54" rx="6" fill="none" stroke="#c45d3e" stroke-width="1.3"/>
    <text x="109" y="128" text-anchor="middle" class="lbl" fill="#c45d3e">Agent A</text>
    <text x="109" y="145" text-anchor="middle" class="unt">WRITES OUTPUT · UNTRUSTED</text>
  </g>
  <!-- poisoned write -->
  <path d="M184 131 L282 131" fill="none" stroke="#c45d3e" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- shared memory (the vector) -->
  <g>
    <rect x="285" y="104" width="150" height="54" rx="6" fill="#f3f1ed" stroke="#e5e2dc"/>
    <text x="360" y="128" text-anchor="middle" class="lbl">shared memory</text>
    <text x="360" y="145" text-anchor="middle" class="sub">SINK · PERSISTS</text>
  </g>
  <!-- read back -->
  <path d="M435 131 L534 131" fill="none" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#ai)"/>

  <!-- Agent B (reader) -->
  <g>
    <rect x="536" y="104" width="150" height="54" rx="6" fill="#f3f1ed" stroke="#e5e2dc"/>
    <text x="611" y="128" text-anchor="middle" class="lbl">Agent B</text>
    <text x="611" y="145" text-anchor="middle" class="sub">READS AS INSTRUCTION</text>
  </g>

  <!-- consequential action -->
  <path d="M611 158 L611 190" fill="none" stroke="#7c2b21" stroke-width="1.5" marker-end="url(#ax)"/>
  <g>
    <rect x="536" y="192" width="150" height="42" rx="6" fill="none" stroke="#7c2b21" stroke-width="1.3"/>
    <text x="611" y="212" text-anchor="middle" class="lbl" fill="#7c2b21">auto_refund($999)</text>
    <text x="611" y="226" text-anchor="middle" class="bad">CONSEQUENTIAL ACTION</text>
  </g>

  <text x="34" y="224" class="sub">Agent A's output becomes Agent B's instruction.</text>
</svg>
