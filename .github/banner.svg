<svg width="418" height="104" viewBox="3 14 418 104" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aegis Memory — secure memory and context for AI agents">
  <style>
    .ink  { fill:#1a1a1a; }
    .inks { stroke:#1a1a1a; }
    @media (prefers-color-scheme: dark) {
      .ink  { fill:#f3f1ed; }
      .inks { stroke:#f3f1ed; }
    }
  </style>
  <!-- delta mark: ink linework, no fill, no tile, no gradient -->
  <path class="inks" d="M46 30 L74 84 L18 84 Z" fill="none" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- wordmark -->
  <text class="ink" x="100" y="72" font-family="Newsreader, Georgia, 'Times New Roman', serif" font-size="42" font-weight="600" letter-spacing="-0.8">Aegis Memory</text>
  <!-- mono terracotta kicker (the signature) -->
  <text x="102" y="104" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'JetBrains Mono', monospace" font-size="12" font-weight="600" letter-spacing="0.14em" fill="#c45d3e">SECURE MEMORY &amp; CONTEXT FOR AI AGENTS</text>
</svg>
