# OSV-Scanner ignore list for the injection-benchmark dev tooling.
#
# OpenSSF Scorecard's "Vulnerabilities" check runs OSV-Scanner recursively over EVERY manifest in
# the repo, including this benchmark-only requirements.txt. Crucially, OSV-Scanner scores the LOWER
# BOUND of each `>=` constraint, so a floor like `torch>=2.4` is evaluated at 2.4 and flags every
# advisory fixed after it. Wherever a fix exists we raise the floor instead of ignoring (requests,
# torch, transformers — see requirements.txt). The IDs below are the residual that has NO published
# fix in any release, so they cannot be bumped away.
#
# This whole manifest is dev/benchmark tooling. None of these packages (torch, transformers) are
# dependencies of the shipped `aegis-memory` library or its `[server]` extra — they are never
# installed by `pip install aegis-memory`. The shipped surface is independently gated clean by
# `.github/workflows/pip-audit.yml`. Each entry is a reviewed, accepted decision, not an oversight.
# Full triage + reachability analysis: ../../docs/security/vuln-triage.md
#
# Docs: https://google.github.io/osv-scanner/configuration/

