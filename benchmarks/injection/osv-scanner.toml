# OSV-Scanner / OpenSSF Scorecard ignore list for the injection-benchmark dev tooling.
#
# Scorecard's "Vulnerabilities" check runs OSV-Scanner over every manifest in the repo and evaluates
# dependencies pessimistically: a `>=` floor (or a transitively-pulled package) is matched against
# OSV without resolving to the actually-installed patched version, so it surfaces advisories that the
# pinned floor already clears. None of these packages (numpy, torch, transformers) are dependencies
# of the shipped `aegis-memory` library or its `[server]` extra — they are never installed by
# `pip install aegis-memory`. The shipped surface is independently gated clean by
# `.github/workflows/pip-audit.yml`. Every entry is a reviewed, accepted decision.
# Full triage + reachability analysis: ../../docs/security/vuln-triage.md
#
# Docs: https://google.github.io/osv-scanner/configuration/

